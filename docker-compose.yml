services:
  laravel-api:
    build:
      context: ./laravel-backend-api
      dockerfile: Dockerfile
    container_name: pulselocal-laravel-api
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - ./laravel-backend-api/.env
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      LOG_CHANNEL: stderr
      SESSION_DRIVER: file
      CACHE_STORE: file
      QUEUE_CONNECTION: sync

      # Critical: Laravel calls ML by Docker service name, not localhost.
      ML_SERVICE_URL: http://ml-service:8001
      ML_SERVICE_TIMEOUT_SECONDS: 2
    volumes:
      - ./laravel-backend-api:/var/www/html
      - laravel_vendor:/var/www/html/vendor
    depends_on:
      ml-service:
        condition: service_healthy
    networks:
      - pulselocal-network

  laravel-nginx:
    image: nginx:1.27-alpine
    container_name: pulselocal-laravel-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./laravel-backend-api:/var/www/html:ro
      - ./laravel-backend-api/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - laravel-api
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - pulselocal-network

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: pulselocal-ml-service
    restart: unless-stopped
    ports:
      # Exposed for local Postman/dev testing only.
      # Laravel still uses http://ml-service:8001 internally.
      - "8001:8001"
    environment:
      APP_NAME: PulseLocal ML Service
      APP_ENV: local
      APP_HOST: 0.0.0.0
      APP_PORT: 8001
      LOG_LEVEL: debug
      MOCK_PREDICTION_ENABLED: "false"
      MODEL_PATH: ./app/models/pulselocal_logistic_regression_model.joblib
      RISK_LOW_MAX: 0.39
      RISK_MEDIUM_MAX: 0.69
      RISK_HIGH_MIN: 0.70
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - pulselocal-network

networks:
  pulselocal-network:
    driver: bridge

volumes:
  laravel_vendor:
