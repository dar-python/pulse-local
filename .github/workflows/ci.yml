name: PulseLocal CI

on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    branches:
      - main
      - develop

jobs:
  laravel-tests:
    name: Laravel API Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: laravel-backend-api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, fileinfo, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Prepare Laravel test environment
        env:
          APP_ENV: testing
          APP_DEBUG: "true"
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          ML_SERVICE_URL: http://127.0.0.1:8001
        run: |
          if [ ! -f .env ]; then cp .env.example .env; fi
          php artisan key:generate --ansi
          php artisan config:clear --ansi

      - name: Run Laravel tests
        env:
          APP_ENV: testing
          APP_DEBUG: "true"
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          ML_SERVICE_URL: http://127.0.0.1:8001
        run: php artisan test

  ml-service-tests:
    name: FastAPI ML Service Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ml-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ml-service/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run ML service tests
        run: python -m pytest -q

  ml-training-check:
    name: ML Training Pipeline Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ml-training

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ml-training/requirements.txt

      - name: Install training dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run dataset preparation
        run: python scripts/prepare_dataset.py

      - name: Train model pipeline
        run: python scripts/train_model.py

      - name: Run ML training tests
        run: python -m pytest -q

  flutter-checks:
    name: Flutter Mobile Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: flutter-mobile-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare Flutter CI environment
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            printf '%s\n' \
              'LARAVEL_BASE_URL=http://127.0.0.1:8000' \
              'APP_ENV=ci' > .env
          fi

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze Flutter code
        run: flutter analyze

      - name: Run Flutter tests
        run: flutter test
